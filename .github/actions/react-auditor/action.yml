name: 'React Auditor'
description: 'Run react-auditor on your codebase with problem matcher output'
author: 'chesteralan'
branding:
  icon: 'check-circle'
  color: 'blue'
inputs:
  args:
    description: 'Arguments to pass to react-auditor (e.g. "src/ --fail-on error")'
    required: false
    default: 'src/'
  version:
    description: 'Version of react-auditor to install (e.g. "0.1.4" or "latest")'
    required: false
    default: 'latest'
runs:
  using: 'composite'
  steps:
    - name: Install react-auditor
      shell: bash
      run: |
        if [ "${{ inputs.version }}" = "latest" ]; then
          cargo install react-auditor
        else
          cargo install react-auditor --version "${{ inputs.version }}"
        fi

    - name: Add problem matcher
      shell: bash
      run: |
        cat <<'EOF' > "${{ github.action_path }}/problem-matcher.json"
        {
          "problemMatcher": [
            {
              "owner": "react-auditor",
              "severity": "error",
              "pattern": [
                {
                  "regexp": "^(error|warning)\\s+(\\d+):(\\d+)\\s+\\[([^/]+)/([^\\]]+)\\]\\s+(.+)$",
                  "severity": 1,
                  "line": 2,
                  "column": 3,
                  "code": 5,
                  "message": 6
                }
              ]
            }
          ]
        }
        EOF
        echo "::add-matcher::${{ github.action_path }}/problem-matcher.json"

    - name: Run react-auditor
      shell: bash
      run: |
        react-auditor ${{ inputs.args }}
