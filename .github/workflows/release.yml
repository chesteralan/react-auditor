name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
            suffix: ''
          - target: aarch64-apple-darwin
            os: macos-latest
            suffix: ''
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            suffix: ''
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            suffix: ''
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            suffix: '.exe'

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary
        shell: bash
        run: |
          BINARY_NAME="react-auditor${{ matrix.suffix }}"
          ARCHIVE_NAME="react-auditor-${{ matrix.target }}"
          cp "target/${{ matrix.target }}/release/$BINARY_NAME" "$ARCHIVE_NAME"
          echo "archive=$ARCHIVE_NAME" >> $GITHUB_ENV

      - uses: actions/upload-artifact@v4
        with:
          name: react-auditor-${{ matrix.target }}
          path: react-auditor-${{ matrix.target }}

  create-release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: react-auditor-*
          merge-multiple: true

      - name: Generate checksums
        run: sha256sum react-auditor-* > checksums.txt

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            react-auditor-*
            checksums.txt
          generate_release_notes: true

  publish-npm:
    name: Publish to npm
    needs: create-release
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: npm
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
